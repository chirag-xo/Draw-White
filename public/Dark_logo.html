<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAW — Design Research Workshop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}

/* ── CURSOR ── */
#cursor{position:fixed;width:5px;height:5px;background:#fff;border-radius:50%;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cursor-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(255,255,255,.3);
  border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}

/* ── HERO ── */
#hero{position:fixed;inset:0;z-index:1;background:#000;overflow:hidden}
.hero-slide{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:0;transform:scale(1.06);
  transition:opacity 1.6s cubic-bezier(0.77,0,0.175,1),transform 7s cubic-bezier(0.25,0.1,0.25,1);
}
.hero-slide.active{opacity:1;transform:scale(1)}
.hero-slide.exit{opacity:0;transform:scale(0.97)}
/* Vignette */
#hero::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.6) 0%,transparent 30%,transparent 58%,rgba(0,0,0,.72) 100%),
    radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.38) 100%);
}
/* Hero text */
#hero-ui{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 72px 72px;opacity:0;
}
.h-eyebrow{
  font-family:'Courier New',monospace;font-size:7.5px;
  letter-spacing:.54em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:16px;
}
.h-headline{
  font-family:Georgia,'Times New Roman',serif;font-weight:300;
  font-size:clamp(34px,4.2vw,68px);letter-spacing:.05em;
  line-height:1.1;color:#fff;max-width:560px;
}
.h-headline em{font-style:italic;color:rgba(255,255,255,.48)}
/* Slide counter */
#slide-counter{
  position:absolute;right:72px;bottom:78px;z-index:3;
  font-family:'Courier New',monospace;font-size:8px;
  letter-spacing:.38em;color:rgba(255,255,255,.22);opacity:0;
}
/* Progress */
#slide-bar{position:absolute;bottom:0;left:0;right:0;z-index:3;height:1px;
  background:rgba(255,255,255,.07);opacity:0}
#slide-fill{height:100%;width:0;background:rgba(255,255,255,.28);transition:width linear}

/* ── NAVBAR ── */
#navbar{
  position:fixed;top:0;left:0;right:0;height:70px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;opacity:0;
}
#navbar::after{
  content:'';position:absolute;bottom:0;left:48px;right:48px;
  height:1px;background:rgba(255,255,255,.08);
}
/* Nav logo — centered absolutely */
#nav-logo-center{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  height:38px;display:flex;align-items:center;justify-content:center;
  opacity:0;
}
#nav-logo-center img{height:38px;width:auto;object-fit:contain;display:block;}
.nav-links{display:flex;gap:36px;}
.nav-links a{
  font-family:'Courier New',monospace;font-size:7.5px;
  letter-spacing:.42em;text-transform:uppercase;
  color:rgba(255,255,255,.3);text-decoration:none;cursor:pointer;
  transition:color .3s;
}
.nav-links a:hover{color:rgba(255,255,255,.75)}
.nav-cta{
  font-family:'Courier New',monospace;font-size:7px;
  letter-spacing:.38em;text-transform:uppercase;
  color:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.12);
  padding:9px 18px;background:none;cursor:pointer;
  transition:border-color .3s,color .3s;
}
.nav-cta:hover{border-color:rgba(255,255,255,.38);color:rgba(255,255,255,.6)}

/* Corner marks */
.cm{position:fixed;width:15px;height:15px;opacity:0;z-index:90}
.cm svg{width:100%;height:100%}
.cm.tl{top:18px;left:18px}.cm.tr{top:18px;right:18px;transform:scaleX(-1)}
.cm.bl{bottom:18px;left:18px;transform:scaleY(-1)}.cm.br{bottom:18px;right:18px;transform:scale(-1)}

#replay{
  position:fixed;bottom:20px;right:20px;z-index:300;
  font-family:'Courier New',monospace;font-size:7px;letter-spacing:.4em;
  text-transform:uppercase;color:rgba(255,255,255,.14);
  border:none;background:none;cursor:pointer;padding:10px 14px;opacity:0;transition:color .3s;
}
#replay:hover{color:rgba(255,255,255,.45)}

/* ══════════════════════════════════════
   GRAIN OVERLAY — film-grain texture for depth
══════════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;z-index:8000;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:200px 200px;
  mix-blend-mode:overlay;
}

/* ══════════════════════════════════════
   LOADER
══════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:500;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  will-change:opacity;
}

/* Ambient glow beneath logo */
#logo-wrap::before{
  content:'';
  position:absolute;
  width:260px;height:260px;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 68%);
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-46%);
  pointer-events:none;
  z-index:-1;
}

/* Gold hairline separator between logo and text */
#logo-divider{
  width:1px;height:28px;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
  margin:4px auto 0;
  opacity:0;
}

/* Subtle loader scan line — moves top to bottom once */
#loader-scanline{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.04),transparent);
  top:0;pointer-events:none;z-index:2;
  animation:scanline 2.8s linear 0.2s 1 forwards;
  opacity:0;
}
@keyframes scanline{
  0%{top:0%;opacity:1}
  100%{top:100%;opacity:0}
}

/* SVG logo wrap — single node, all animation phases */
#logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  will-change:transform;transform-origin:50% 50%;
}

/* ══════════════════════════════════════
   THE LOGO SVG

   Pixel-perfect from analysis:
   ViewBox: 0 0 200 220

   Measured from 450×450 source image:
   All coords normalized to 200×220

   Key vertices:
     Apex (top-center):    (100, 7)
     Left corner:          (8,  54)
     Right corner:         (191, 55)
     Shoulder-left:        (73, 174)
     Shoulder-right:       (128, 174)
     Tip (bottom-center):  (100, 211)
     Spine top:            (100, 7)
     Spine bottom:         (100, 174)

   Paths in drawing order:
     lp1: Apex → Left corner       (left slope)
     lp2: Apex → Right corner      (right slope, mirror)
     lp3: Left corner → Shoulder-L (left body)
     lp4: Right corner → Shoulder-R (right body, mirror)
     lp5: Shoulder-L → Shoulder-R  (crossbar)
     lp6: Shoulder-L → Tip         (left nib)
     lp7: Shoulder-R → Tip         (right nib, mirror)
     lp8: Apex → Spine-bottom      (inner spine, dim)
══════════════════════════════════════ */
#logo-svg{
  width:180px;height:198px; /* maintain 200:220 ratio — scaled up ~38% */
  display:block;overflow:visible;
}
.lp{fill:none;stroke:#fff;stroke-linecap:round;stroke-linejoin:round}

/* Brand text */
#loader-text{
  margin-top:36px;display:flex;flex-direction:column;
  align-items:center;gap:12px;opacity:0;will-change:opacity,transform;
}
.lt-name{
  font-family:'Courier New',monospace;font-size:19px;
  letter-spacing:.58em;text-transform:uppercase;color:#fff;font-weight:normal;white-space:nowrap;
}
.lt-sub{
  font-family:'Courier New',monospace;font-size:9px;
  letter-spacing:.5em;text-transform:uppercase;
  color:rgba(255,255,255,.28);white-space:nowrap;
}
</style>
</head>

<script>
(function(){

  /* ── CURSOR ── */
  const cur=document.getElementById('cursor'),curR=document.getElementById('cursor-ring');
  let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;
    cur.style.left=mx+'px';cur.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
    curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(loop);})();

  /* ── SLIDESHOW ── */
  const slides=document.querySelectorAll('.hero-slide');
  const counter=document.getElementById('slide-counter');
  const fill=document.getElementById('slide-fill');
  const SDUR=5200;
  let si=0,stimer=null;

  function goSlide(i){
    slides[si].classList.remove('active');
    slides[si].classList.add('exit');
    setTimeout(()=>slides[si].classList.remove('exit'),1800);
    si=i%slides.length;
    slides[si].classList.add('active');
    counter.textContent=String(si+1).padStart(2,'0')+' / 0'+slides.length;
    fill.style.transition='none';fill.style.width='0';
    setTimeout(()=>{fill.style.transition='width '+SDUR+'ms linear';fill.style.width='100%';},60);
  }

  function startSlides(){
    slides[0].classList.add('active');
    fill.style.transition='width '+SDUR+'ms linear';fill.style.width='100%';
    stimer=setInterval(()=>goSlide(si+1),SDUR);
  }

  /* ── MAIN ANIMATION ── */
  window.addEventListener('load',function(){
    const gsap=window.gsap;
    if(!gsap){console.error('GSAP not loaded');return;}

    /* Measure all paths */
    ['lp1','lp2','lp3','lp4','lp5','lp6','lp7','lp8'].forEach(id=>{
      const el=document.getElementById(id);
      const len=el.getTotalLength();
      el.style.strokeDasharray=len;
      el.style.strokeDashoffset=len;
    });

    const loader=document.getElementById('loader');
    const logoWrap=document.getElementById('logo-wrap');
    const loaderText=document.getElementById('loader-text');

    const tl=gsap.timeline();

    /* ══════════════════════════════════════
       PHASE 1 — Draw logo (blueprint sketch)
       Architectural order, paired mirrors
    ══════════════════════════════════════ */
    tl
    .set(loader,{opacity:1})

    // Slopes from apex — left & right mirror simultaneously
    .to('#lp1',{strokeDashoffset:0,duration:.68,ease:'power2.inOut'},0.4)
    .to('#lp2',{strokeDashoffset:0,duration:.68,ease:'power2.inOut'},0.4)

    // Body descends — left & right simultaneously
    .to('#lp3',{strokeDashoffset:0,duration:.62,ease:'power2.inOut'},'-=.08')
    .to('#lp4',{strokeDashoffset:0,duration:.62,ease:'power2.inOut'},'<')

    // Spine draws concurrent with body
    .to('#lp8',{strokeDashoffset:0,duration:.78,ease:'power1.out'},'<-.12')

    // Crossbar snaps in
    .to('#lp5',{strokeDashoffset:0,duration:.26,ease:'power3.inOut'},'+=.05')

    // Nib slopes — mirror
    .to('#lp6',{strokeDashoffset:0,duration:.24,ease:'power2.inOut'},'+=.03')
    .to('#lp7',{strokeDashoffset:0,duration:.24,ease:'power2.inOut'},'<')

    // Nibs complete — final strokes
    .to(['#lp6','#lp7'],{filter:'drop-shadow(0 0 9px rgba(255,255,255,.85))',duration:.18},'+=.02')
    
    /* ══════════════════════════════════════
       PHASE 2 — Brand text fades in
    ══════════════════════════════════════ */
    .to(loaderText,{opacity:1,y:0,duration:.6,ease:'power2.out'},'+=.2')

    /* ══════════════════════════════════════
       PHASE 3 — Zoom tension (1.0 → 1.12)
    ══════════════════════════════════════ */
    .to(logoWrap,{
      scale:1.12,transformOrigin:'50% 50%',
      duration:1.05,ease:'power1.inOut'
    },'+=.5')

    .to({},'+=.15') // hold

    /* ══════════════════════════════════════
       PHASE 4 — Logo becomes the reveal mask

       Logo zooms from 1.12 → fills viewport.
       The SVG strokes expand until white fills screen.
       Loader fades out revealing hero behind.

       Scale calculation:
         SVG is 130px wide inside loader (200vb units → 130px)
         Need to fill ~1920px → scale ≈ 1920/130 ≈ 14.8
         Use 20× to safely cover all screens.
         transformOrigin locked to 50% 50% (center of screen)
    ══════════════════════════════════════ */

    // Text out
    .to(loaderText,{opacity:0,duration:.25,ease:'power2.in'},'+=.06')
    .to(['#lp6','#lp7'],{filter:'none',duration:.2},'<')

    // The zoom — logo expands to fill and beyond
    .to(logoWrap,{
      scale:15,
      duration:1.45,
      ease:'power3.in',
      transformOrigin:'50% 50%',
    },'+=.05')

    // Loader bg goes white then fades — the "flash through the lens"
    .to(loader,{backgroundColor:'#fff',duration:.42,ease:'power2.in'},'-=.52')
    .to(loader,{opacity:0,duration:.38,ease:'power1.out'},'-=.06')

    /* ══════════════════════════════════════
       PHASE 5 — Hero + UI reveal
    ══════════════════════════════════════ */
    .add(()=>{
      loader.style.display='none';
      startSlides();
    })

    // Navbar
    .to('#navbar',{opacity:1,duration:.85,ease:'power2.out'},'-=.1')

    // Nav logo center fades in
    .to('#nav-logo-center',{opacity:1,duration:.7,ease:'power2.out'},'<+=.15')

    // Hero text
    .to('#hero-ui',{opacity:1,duration:1.05,ease:'power2.out'},'<+=.1')

    // Counter + bar
    .to(['#slide-counter','#slide-bar'],{opacity:1,duration:.65,ease:'power2.out'},'<+=.35')

    // Corner marks
    .to(['#cm-tl','#cm-tr','#cm-bl','#cm-br'],{
      opacity:.2,stagger:.07,duration:.4,ease:'power2.out'
    },'<')

    .to('#replay',{opacity:1,duration:.4},'+=.3');

  });
})();
</script>
</body>
</html>
